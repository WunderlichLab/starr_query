<VirtualHost *:80>
    ServerName localhost

    WSGIDaemonProcess starr_query \
        python-home=/usr/local \
        python-path=/var/www/starr_query \
        processes=2 \
        threads=5

    WSGIProcessGroup starr_query
    WSGIApplicationGroup %{GLOBAL}

    WSGIScriptAlias / /var/www/starr_query/starr_query.wsgi
    WSGIPassAuthorization On

    <Directory /var/www/starr_query>
        Require all granted
        Options -Indexes
    </Directory>

    Alias /static/ /var/www/starr_query/static/
    <Directory /var/www/starr_query/static>
        Require all granted
        Options -Indexes
        Header set Cache-Control "max-age=604800, public"
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/starr_query_error.log
    CustomLog ${APACHE_LOG_DIR}/starr_query_access.log combined
    LogLevel info
</VirtualHost>